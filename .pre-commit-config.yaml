ci:
  autofix_commit_msg: "Apply pre-commit auto fixes"
  autoupdate_commit_msg: "Auto-update pre-commit hooks"
  skip: [mypy]

repos:
  - repo: local
    hooks:
      - id: codespell
        name: codespell
        entry: uv run --active codespell --toml=pyproject.toml
        language: system
        types: [text]

      - id: mypy
        name: mypy
        entry: uv run --active mypy
        language: python
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: uv run --active ruff check
        args:
          [
            "--force-exclude",
            "--fix",
            "--exit-non-zero-on-fix",
            "--config",
            "pyproject.toml",
          ]
        language: python
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run --active ruff format
        args: ["--force-exclude", "--config", "pyproject.toml"]
        language: python
        types: [python]
